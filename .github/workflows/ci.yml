name: CI Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    # Запускаем на чистом сервере GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем ваш код из репозитория на сервер GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Собираем Docker-образ
      - name: Build Docker Image
        run: docker build -t my-backend-image .

      # 3. Запускаем тесты внутри собранного образа
      - name: Run Tests
        run: docker run --rm my-backend-image pytest -s -v
