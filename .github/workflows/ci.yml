name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # или master, в зависимости от вашей главной ветки

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-backend-image .

      # GitHub Actions стирает данные между джобами (jobs), 
      # поэтому тест нужно запустить на том же сервере сразу после сборки.
      - name: Run Tests
        run: docker run --rm my-backend-image pytest -s -v

  deploy:
    runs-on: self-hosted
    needs: build # Ждет, пока успешно выполнится сборка и тесты
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ВНИМАНИЕ: См. важное примечание ниже про деплой
      - name: Deploy with Docker Compose
        run: docker compose up -d
